# fusion-oauth provider config
# Copy to providers.yaml and edit. providers.yaml is gitignored.
#
# Each provider has:
#   name:     label shown in output
#   backend:  how credentials are read -> claude-oauth | minimax-oauth | api-key
#   model:    model id sent to the endpoint
#   endpoint: (api-key backend only) full /v1/messages-compatible URL
#   api_key_env: (api-key backend only) env var holding the key
#   enabled:  include in the panel (true/false)
#   panel:    (fuse.py) include this model in the deliberation panel (default: all enabled)
#   judge:    (fuse.py) use this model as the synthesizing judge (one provider)
#
# OAuth backends read tokens already on disk (your own subscription, your own box):
#   claude-oauth   -> ~/.claude/.credentials.json   (Claude Code login)
#   minimax-oauth  -> ~/.hermes/auth.json           (MiniMax OAuth login)
# No tokens are ever written to this file or committed.

providers:
  - name: Claude-Opus
    backend: claude-oauth
    model: claude-opus-4-20250514
    enabled: true
    panel: true
    judge: true        # Opus synthesizes the panel (fuse.py)

  - name: MiniMax-M3
    backend: minimax-oauth
    model: MiniMax-M3
    enabled: true
    panel: true

  # Example: any OpenAI-or-Anthropic-compatible endpoint via a plain API key.
  # Reads the key from the env var named below; never stored in this file.
  - name: GPT-4o
    backend: api-key
    model: gpt-4o
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    enabled: false

  - name: OpenRouter
    backend: api-key
    model: anthropic/claude-3.5-sonnet
    endpoint: https://openrouter.ai/api/v1/chat/completions
    api_key_env: OPENROUTER_API_KEY
    enabled: false
